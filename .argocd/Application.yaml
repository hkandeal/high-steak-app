apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    app: high_steak
    notifications.argoproj.io/subscribe.slack: argo-cd-notifications
  name: high-steak
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:hkandeal/high-steak-app.git
    targetRevision: main
    path: helm/high-steak
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
