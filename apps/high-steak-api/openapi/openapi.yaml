          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserPage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /users/{id}/blocked:
