openapi: 3.0.3
info:
  title: High Steak API
  description: |
    REST API for the High Steak social steak-rating app.

    ## Authorization

    Most endpoints require `Authorization: Bearer <JWT>`. Each operation lists required permission scopes in **`x-required-scopes`**. The JWT must include those values in its `scopes` claim (see login/register token).

    **Role and scopes are never returned in JSON responses** — clients must read `roles` and `scopes` from the JWT payload only.
  version: 1.0.0
  contact:
    name: High Steak

servers:
  - url: http://localhost:8080/api
    description: Local development

tags:
  - name: Health
    description: Service health checks
  - name: Auth
    description: Registration, login, and current user profile
  - name: Posts
    description: Steak post feed and moderation
  - name: Users
    description: User administration (admin)
  - name: Subscriptions
    description: Follow users and subscription feeds
  - name: Places
    description: Restaurant place search, resolve, and nearby discovery

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: getHealth
      responses:
        '200':
          description: Service is up
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /config:
    get:
      tags: [Health]
      summary: Public client configuration
      operationId: getAppConfig
      responses:
        '200':
          description: Runtime limits for web and mobile clients
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppConfig'

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User created; verify email before login when verificationRequired is true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Username or email already taken

  /auth/verify-email:
    post:
      tags: [Auth]
      summary: Verify email and start a session
      operationId: verifyEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
      responses:
        '200':
          description: Email verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/resend-verification:
    post:
      tags: [Auth]
      summary: Resend verification email
      description: Always succeeds to avoid email enumeration.
      operationId: resendVerification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResendVerificationRequest'
      responses:
        '204':
          description: Request accepted

  /auth/login:
    post:
      tags: [Auth]
      summary: Log in
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      description: |
        Exchanges a valid refresh token for a new access token and rotated refresh token (sliding session).
        Reuse of a revoked refresh token revokes the entire token family.
      operationId: refreshAuth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Session refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Log out
      description: Revokes the presented refresh token. Does not require a valid access token.
      operationId: logout
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '204':
          description: Refresh token revoked
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/check-username:
    get:
      tags: [Auth]
      summary: Check username availability
      description: |
        Validates username format (letters, digits, `_`, `-`; must start with a letter)
        and reports whether the handle is already taken. Public — no auth required.
      operationId: checkUsername
      parameters:
        - name: username
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/Username'
      responses:
        '200':
          description: Availability result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailabilityResponse'

  /auth/check-email:
    get:
      tags: [Auth]
      summary: Check email availability
      description: Validates email format and reports whether it is already registered.
      operationId: checkEmail
      parameters:
        - name: email
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/Email'
      responses:
        '200':
          description: Availability result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailabilityResponse'

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      operationId: getMe
      x-required-scopes: []
      description: Valid JWT required. No specific scope. Role/scopes are not returned — read from token.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      tags: [Auth]
      summary: Update current user profile
      operationId: updateMe
      x-required-scopes: []
      description: Valid JWT required. No specific scope. Returns refreshed JWT; role/scopes are not in the response body.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UpdateProfileMultipartForm'
      responses:
        '200':
          description: Updated profile with refreshed JWT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateProfileResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/request-account-deletion:
    post:
      tags: [Auth]
      summary: Request account deletion
      description: |
        Sends a confirmation email with a link to permanently delete the account and all associated data.
        Staff accounts (ADMIN, MODERATOR) cannot use self-service deletion.
      operationId: requestAccountDeletion
      x-required-scopes: []
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Confirmation email sent
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /auth/confirm-account-deletion:
    post:
      tags: [Auth]
      summary: Confirm account deletion
      description: |
        Permanently deletes the user and all cascaded data after validating the email link token.
        Sends a final goodbye email to the former account address.
      operationId: confirmAccountDeletion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmAccountDeletionRequest'
      responses:
        '204':
          description: Account deleted
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /auth/request-password-reset:
    post:
      tags: [Auth]
      summary: Request password reset
      description: |
        Sends a password reset email when the username and email match an active account.
        Always returns the same message to avoid account enumeration. Blocked accounts receive no email.
      operationId: requestPasswordReset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestPasswordResetRequest'
      responses:
        '200':
          description: Request accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password
      description: |
        Sets a new password using the token from the reset email link.
        Revokes all refresh tokens for the account.
      operationId: resetPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '204':
          description: Password updated
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /places/autocomplete:
    get:
      tags: [Places]
      summary: Autocomplete restaurant places
      operationId: autocompletePlaces
      x-required-scopes:
        - places:read
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: lat
          in: query
          schema:
            type: number
            format: double
        - name: lng
          in: query
          schema:
            type: number
            format: double
      responses:
        '200':
          description: Place suggestions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutocompleteResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /places/resolve:
    post:
      tags: [Places]
      summary: Resolve and upsert a place
      operationId: resolvePlace
      x-required-scopes:
        - places:read
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResolvePlaceRequest'
      responses:
        '200':
          description: Resolved place
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaceSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /places/nearby:
    get:
      tags: [Places]
      summary: Nearby places with visible map-tagged posts
      description: |
        Restaurants within `radiusM` that have posts the viewer can see on the map —
        public posts, the viewer's own posts, and posts from users they follow.
      operationId: findNearbyPlaces
      x-required-scopes:
        - places:read
      security:
        - bearerAuth: []
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
            format: double
        - name: lng
          in: query
          required: true
          schema:
            type: number
            format: double
        - name: radiusM
          in: query
          schema:
            type: integer
        - $ref: '#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Paginated nearby places
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaceNearbyPage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /places/{placeId}:
    get:
      tags: [Places]
      summary: Get place by ID
      operationId: getPlace
      x-required-scopes:
        - places:read
      security:
        - bearerAuth: []
      parameters:
        - name: placeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Place details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaceSummary'
        '404':
          $ref: '#/components/responses/NotFound'

  /places/{placeId}/posts:
    get:
      tags: [Places]
      summary: Posts at a place visible to the viewer
      description: |
        Map-tagged posts at the restaurant that the authenticated viewer can see —
        public posts, their own posts, and posts from users they follow.
      operationId: getPostsAtPlace
      x-required-scopes:
        - places:read
      security:
        - bearerAuth: []
      parameters:
        - name: placeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Paginated posts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostPage'
        '404':
          $ref: '#/components/responses/NotFound'

  /posts/nearby:
    get:
      tags: [Posts]
      summary: Nearby feed (public and followed posts at tagged restaurants)
      description: |
        Paginated map-tagged posts from restaurants within `radiusM` of the given coordinates.
        Includes public posts from the community and posts from users the viewer follows
        (including `FOLLOWERS_ONLY`). Excludes the viewer's own posts.
      operationId: getNearbyFeed
      x-required-scopes:
        - posts:read
      security:
        - bearerAuth: []
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
            format: double
        - name: lng
          in: query
          required: true
          schema:
            type: number
            format: double
        - name: radiusM
          in: query
          required: false
          schema:
            type: integer
            default: 50000
        - $ref: '#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Paginated list of nearby posts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostPage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /posts:
    get:
      tags: [Posts]
      summary: Everyone feed (public posts from other users)
      description: |
        Paginated public, non-hidden posts from the community, newest first.
        Excludes the authenticated viewer's own posts (see your profile or `/posts/mine`).
        `FOLLOWERS_ONLY` posts never appear here.
      operationId: getFeed
      x-required-scopes:
        - posts:read
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Paginated list of posts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostPage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Posts]
      summary: Create a post
      operationId: createPost
      x-required-scopes:
        - posts:write
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreatePostForm'
      responses:
        '201':
          description: Post created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /posts/review-tags:
    get:
      tags: [Posts]
      summary: List predefined quick-review tags
      operationId: getReviewTags
      x-required-scopes:
        - posts:read
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Positive and negative tag catalog
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewTagCatalog'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /posts/mine:
    get:
      tags: [Posts]
      summary: List current user's posts
      operationId: getMyPosts
      x-required-scopes:
        - posts:read:own
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Paginated user's posts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostPage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /posts/mine/moderation-notices:
    get:
      tags: [Posts]
      summary: List current user's moderation notices (hidden or recently restored posts)
      operationId: getMyModerationNotices
      x-required-scopes:
        - posts:read:own
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Posts hidden from feeds or restored after moderation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Post'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /posts/hidden:
    get:
      tags: [Posts]
      summary: List hidden posts (moderators)
      operationId: getHiddenPosts
      x-required-scopes:
        - posts:moderate
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Paginated hidden posts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostPage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /posts/{id}:
    get:
      tags: [Posts]
      summary: Get a single post
      description: |
        Returns a post if the caller may view it. Followers-only posts return 404 for
        non-followers (and non-moderators) to avoid leaking existence.
      operationId: getPost
      x-required-scopes:
        - posts:read
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '200':
          description: Post details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Posts]
      summary: Update own post
      operationId: updatePost
      x-required-scopes:
        - posts:write
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PostId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UpdatePostForm'
      responses:
        '200':
          description: Post updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Posts]
      summary: Delete a post
      description: Post owner needs posts:delete:own; moderators/admins may use posts:delete:any.
      operationId: deletePost
      x-required-scopes:
        - posts:delete:own
        - posts:delete:any
      x-required-scopes-one-of: true
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '204':
          description: Post deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /posts/{id}/hide:
    patch:
      tags: [Posts]
      summary: Hide a post from public feeds (moderators)
      operationId: hidePost
      x-required-scopes:
        - posts:moderate
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PostId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HidePostRequest'
      responses:
        '200':
          description: Post hidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /posts/{id}/unhide:
    patch:
      tags: [Posts]
      summary: Restore a hidden post to public feeds (moderators)
      operationId: unhidePost
      x-required-scopes:
        - posts:moderate
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '200':
          description: Post restored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /posts/{id}/comments:
    get:
      tags: [Posts]
      summary: List comments on a post
      description: Returns comments newest-first (`createdAt` descending), matching the main feed sort order.
      operationId: listPostComments
      x-required-scopes:
        - posts:read
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PostId'
        - $ref: '#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Paginated comments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentPage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Posts]
      summary: Add a comment to a post
      operationId: addPostComment
      x-required-scopes:
        - comments:write
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PostId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommentRequest'
      responses:
        '201':
          description: Comment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /posts/{id}/comments/{commentId}:
    patch:
      tags: [Posts]
      summary: Edit your comment on a post
      description: Only the comment author may update the comment body.
      operationId: updatePostComment
      x-required-scopes:
        - comments:write
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PostId'
        - $ref: '#/components/parameters/CommentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCommentRequest'
      responses:
        '200':
          description: Comment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Posts]
      summary: Delete a comment on a post
      description: The post author may delete any comment on their post. Comment authors may delete their own comments.
      operationId: deletePostComment
      x-required-scopes:
        - posts:read
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PostId'
        - $ref: '#/components/parameters/CommentId'
      responses:
        '204':
          description: Comment deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
