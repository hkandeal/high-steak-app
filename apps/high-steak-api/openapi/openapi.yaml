openapi: 3.0.3
info:
  title: High Steak API
  description: |
    REST API for the High Steak social steak-rating app.

    ## Authorization

    Most endpoints require `Authorization: Bearer <JWT>`. Each operation lists required permission scopes in **`x-required-scopes`**. The JWT must include those values in its `scopes` claim (see login/register token).

    **Role and scopes are never returned in JSON responses** — clients must read `roles` and `scopes` from the JWT payload only.
  version: 1.0.0
  contact:
    name: High Steak

servers:
  - url: http://localhost:8080/api
    description: Local development

tags:
  - name: Health
    description: Service health checks
  - name: Auth
    description: Registration, login, and current user profile
  - name: Posts
    description: Steak post feed and moderation
  - name: Users
    description: User administration (admin)
  - name: Subscriptions
    description: Follow users and subscription feeds

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: getHealth
      responses:
        '200':
          description: Service is up
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /config:
    get:
      tags: [Health]
      summary: Public client configuration
      operationId: getAppConfig
      responses:
        '200':
          description: Runtime limits for web and mobile clients
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppConfig'

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Username or email already taken

  /auth/login:
    post:
      tags: [Auth]
      summary: Log in
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      description: |
        Exchanges a valid refresh token for a new access token and rotated refresh token (sliding session).
        Reuse of a revoked refresh token revokes the entire token family.
      operationId: refreshAuth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Session refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Log out
      description: Revokes the presented refresh token. Does not require a valid access token.
      operationId: logout
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '204':
          description: Refresh token revoked
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/check-username:
    get:
      tags: [Auth]
      summary: Check username availability
      description: |
        Validates username format (letters, digits, `_`, `-`; must start with a letter)
        and reports whether the handle is already taken. Public — no auth required.
      operationId: checkUsername
      parameters:
        - name: username
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/Username'
      responses:
        '200':
          description: Availability result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailabilityResponse'

  /auth/check-email:
    get:
      tags: [Auth]
      summary: Check email availability
      description: Validates email format and reports whether it is already registered.
      operationId: checkEmail
      parameters:
        - name: email
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/Email'
      responses:
        '200':
          description: Availability result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailabilityResponse'

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      operationId: getMe
      x-required-scopes: []
      description: Valid JWT required. No specific scope. Role/scopes are not returned — read from token.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      tags: [Auth]
      summary: Update current user profile
      operationId: updateMe
      x-required-scopes: []
      description: Valid JWT required. No specific scope. Returns refreshed JWT; role/scopes are not in the response body.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UpdateProfileMultipartForm'
      responses:
        '200':
          description: Updated profile with refreshed JWT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateProfileResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /posts:
    get:
      tags: [Posts]
      summary: Authenticated feed (non-hidden posts)
      operationId: getFeed
      x-required-scopes:
        - posts:read
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Paginated list of posts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostPage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Posts]
      summary: Create a post
      operationId: createPost
      x-required-scopes:
        - posts:write
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreatePostForm'
      responses:
        '201':
          description: Post created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /posts/review-tags:
    get:
      tags: [Posts]
      summary: List predefined quick-review tags
      operationId: getReviewTags
      x-required-scopes:
        - posts:read
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Positive and negative tag catalog
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewTagCatalog'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /posts/mine:
    get:
      tags: [Posts]
      summary: List current user's posts
      operationId: getMyPosts
      x-required-scopes:
        - posts:read:own
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Paginated user's posts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostPage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /posts/hidden:
    get:
      tags: [Posts]
      summary: List hidden posts (moderators)
      operationId: getHiddenPosts
      x-required-scopes:
        - posts:moderate
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Paginated hidden posts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostPage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /posts/{id}:
    get:
      tags: [Posts]
      summary: Get a single post
      description: |
        Returns a post if the caller may view it. Followers-only posts return 404 for
        non-followers (and non-moderators) to avoid leaking existence.
      operationId: getPost
      x-required-scopes:
        - posts:read
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '200':
          description: Post details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Posts]
      summary: Update own post
      operationId: updatePost
      x-required-scopes:
        - posts:write
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PostId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UpdatePostForm'
      responses:
        '200':
          description: Post updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Posts]
      summary: Delete a post
      description: Post owner needs posts:delete:own; moderators/admins may use posts:delete:any.
      operationId: deletePost
      x-required-scopes:
        - posts:delete:own
        - posts:delete:any
      x-required-scopes-one-of: true
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '204':
          description: Post deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /posts/{id}/hide:
    patch:
      tags: [Posts]
      summary: Hide a post from public feeds (moderators)
      operationId: hidePost
      x-required-scopes:
        - posts:moderate
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PostId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HidePostRequest'
      responses:
        '200':
          description: Post hidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /posts/{id}/unhide:
    patch:
      tags: [Posts]
      summary: Restore a hidden post to public feeds (moderators)
      operationId: unhidePost
      x-required-scopes:
        - posts:moderate
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '200':
          description: Post restored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /posts/{id}/comments:
    get:
      tags: [Posts]
      summary: List comments on a post
      operationId: listPostComments
      x-required-scopes:
        - posts:read
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PostId'
        - $ref: '#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Paginated comments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentPage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Posts]
      summary: Add a comment to a post
      operationId: addPostComment
      x-required-scopes:
        - comments:write
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PostId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommentRequest'
      responses:
        '201':
          description: Comment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /posts/following:
    get:
      tags: [Posts]
      summary: Feed from subscribed users
      operationId: getFollowingFeed
      x-required-scopes:
        - subscriptions:read
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Paginated posts from followed users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostPage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /users/search:
    get:
      tags: [Users]
      summary: Search users to follow
      operationId: searchUsers
      x-required-scopes:
        - users:discover
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          description: Search term matched against username and display name.
          schema:
            type: string
            minLength: 2
            maxLength: 100
          example: ribeye
      responses:
        '200':
          description: Matching user profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserPublicProfile'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /users/{id}:
    get:
      tags: [Users]
      summary: Public user profile
      operationId: getUserProfile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPublicProfile'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{id}/posts:
    get:
      tags: [Posts]
      summary: Posts by user (authenticated)
      description: |
        Lists posts visible to the authenticated viewer on this profile. Followers-only
        posts are included only when the viewer follows the author or is the author.
      operationId: getUserPosts
      x-required-scopes:
        - posts:read
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Paginated user posts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostPage'
        '404':
          $ref: '#/components/responses/NotFound'

  /users:
    get:
      tags: [Users]
      summary: List users with search and pagination
      operationId: listUsers
      x-required-scopes:
        - users:read
      description: Available to admins and moderators for the Manage page user list.
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Filter by username, display name, or email (case-insensitive).
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Paginated user list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserPage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /users/{id}/blocked:
    patch:
      tags: [Users]
      summary: Block or unblock a user account
      operationId: setUserBlocked
      x-required-scopes:
        - users:block
      description: |
        Blocked users cannot sign in or use existing JWTs. Moderators may block regular users;
        blocking staff accounts requires `users:manage`.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserBlockedRequest'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{id}/role:
    patch:
      tags: [Users]
      summary: Assign or remove moderator role (admin)
      operationId: updateUserRole
      x-required-scopes:
        - users:manage
      description: |
        Promotes a member to MODERATOR or demotes back to USER. ADMIN accounts cannot be changed
        through this endpoint. Affected users must re-login for a new JWT.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRoleRequest'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /subscriptions:
    get:
      tags: [Subscriptions]
      summary: List users I follow
      operationId: listSubscriptions
      x-required-scopes:
        - subscriptions:read
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Subscriptions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SubscriptionSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /subscriptions/{userId}:
    post:
      tags: [Subscriptions]
      summary: Subscribe to a user
      operationId: subscribeToUser
      x-required-scopes:
        - subscriptions:write
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '201':
          description: Subscribed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Already subscribed
    delete:
      tags: [Subscriptions]
      summary: Unsubscribe from a user
      operationId: unsubscribeFromUser
      x-required-scopes:
        - subscriptions:write
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Unsubscribed
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT from `POST /auth/login` or `POST /auth/register`.

        Decode the payload to read authorization data (never returned in JSON bodies):
        - `roles` — array with one role name (e.g. `USER`, `MODERATOR`, `ADMIN`)
        - `scopes` — permission strings checked by the API (see `x-required-scopes` on each operation)

        Known scopes:
        - `posts:read`, `posts:read:own`, `posts:write`, `posts:delete:own`, `posts:delete:any`, `posts:moderate`
        - `comments:write`
        - `users:discover`, `users:read`, `users:manage`
        - `subscriptions:read`, `subscriptions:write`

  x-scope-definitions:
    "posts:read": View non-hidden posts and comments
    "posts:read:own": View own posts including via /posts/mine
    "posts:write": Create and edit own posts
    "posts:delete:own": Delete own posts
    "posts:delete:any": Delete any post
    "posts:moderate": Hide posts from public feeds
    "comments:write": Add comments to posts
    "users:discover": Search users to follow
    "users:read": List all users (admin and moderator)
    "users:manage": Change user roles (admin)
    "subscriptions:read": View following feed and subscription list
    "subscriptions:write": Follow and unfollow users

  parameters:
    PostId:
      name: id
      in: path
      required: true
      description: Steak post UUID.
      schema:
        type: string
        format: uuid
      example: b2c3d4e5-f6a7-8901-bcde-f12345678901

    PageNumber:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0

    PageSize:
      name: size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 50
        default: 20

  schemas:
    AppConfig:
      type: object
      required: [maxImageSizeMb, maxImagesPerPost, maxImageBytes]
      properties:
        maxImageSizeMb:
          type: integer
          minimum: 1
          maximum: 50
          example: 3
        maxImagesPerPost:
          type: integer
          minimum: 1
          maximum: 20
          example: 10
        maxImageBytes:
          type: integer
          format: int64
          example: 3145728

    Username:
      type: string
      minLength: 3
      maxLength: 50
      pattern: '^[a-zA-Z][a-zA-Z0-9_-]*$'
      description: |
        Unique login handle (`users.username`). Letters, digits, underscores, and hyphens only;
        must start with a letter (not a number).
      example: steak_lover

    AvailabilityResponse:
      type: object
      required: [available, message]
      properties:
        available:
          type: boolean
          description: True when the value is valid and not already taken.
        message:
          type: string
          description: Human-readable validation or availability message.
          example: Username is available

    Email:
      type: string
      format: email
      maxLength: 255
      description: Account email stored in `users.email` (VARCHAR 255).
      example: chef@example.com

    Password:
      type: string
      format: password
      minLength: 8
      maxLength: 100
      description: Plain-text password for login/register (stored hashed server-side).
      example: s3cur3Pass!

    DisplayName:
      type: string
      minLength: 2
      maxLength: 100
      description: Public name shown on posts and profiles (`users.display_name`).
      example: Hossam Kandel

    PostTitle:
      type: string
      minLength: 1
      maxLength: 120
      description: Short headline for the steak post (`steak_posts.title`).
      example: Perfect medium-rare ribeye

    PostComment:
      type: string
      maxLength: 65535
      description: Optional long-form caption (`steak_posts.comment`, TEXT).
      example: 28-day dry-aged ribeye, reverse seared, finished with rosemary butter.

    RestaurantName:
      type: string
      maxLength: 120
      description: Optional venue name (`steak_posts.restaurant_name`).
      example: The Prime Cut

    RestaurantLocation:
      type: string
      maxLength: 255
      description: Optional city or address hint (`steak_posts.restaurant_location`).
      example: Austin, TX

    SteakRating:
      type: integer
      format: int32
      minimum: 1
      maximum: 5
      description: Overall score from 1 (poor) to 5 (exceptional).
      example: 5

    PostVisibility:
      type: string
      enum: [PUBLIC, FOLLOWERS_ONLY]
      default: PUBLIC
      description: |
        Who can see the post. `PUBLIC` appears in the everyone feed.
        `FOLLOWERS_ONLY` is visible to the author, their followers, and moderators only.
      example: PUBLIC

    ImageUpload:
      type: string
      format: binary
      description: Image file (JPEG, PNG, WebP, etc.). Each file must be ≤ 3 MB (configurable via `APP_MAX_IMAGE_SIZE_MB`).

    TagIdList:
      type: array
      maxItems: 12
      items:
        type: string
        format: uuid
      description: Quick-review tag IDs from `GET /posts/review-tags` (max 12).

    RegisterRequest:
      type: object
      required: [username, email, password, displayName]
      properties:
        username:
          $ref: '#/components/schemas/Username'
        email:
          $ref: '#/components/schemas/Email'
        password:
          $ref: '#/components/schemas/Password'
        displayName:
          $ref: '#/components/schemas/DisplayName'

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          maxLength: 50
          description: Registered username.
          example: steaklover42
        password:
          $ref: '#/components/schemas/Password'

    AuthResponse:
      type: object
      required: [token, refreshToken]
      properties:
        token:
          type: string
          description: "JWT access token used as `Authorization: Bearer <token>`."
          example: eyJhbGciOiJIUzI1NiJ9...
        refreshToken:
          type: string
          description: Opaque refresh token for `POST /auth/refresh` and `POST /auth/logout`.

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    LogoutRequest:
      type: object
      properties:
        refreshToken:
          type: string
          description: Refresh token to revoke. Optional when using an HttpOnly cookie (future).

    UpdateProfileRequest:
      type: object
      description: At least one field should be provided when updating profile.
      properties:
        displayName:
          $ref: '#/components/schemas/DisplayName'
        email:
          $ref: '#/components/schemas/Email'

    UpdateProfileMultipartForm:
      type: object
      description: Multipart alternative to JSON profile update. All fields optional.
      properties:
        displayName:
          $ref: '#/components/schemas/DisplayName'
        email:
          $ref: '#/components/schemas/Email'
        avatar:
          $ref: '#/components/schemas/ImageUpload'

    CreatePostForm:
      type: object
      required: [title, rating, images]
      properties:
        title:
          $ref: '#/components/schemas/PostTitle'
        comment:
          $ref: '#/components/schemas/PostComment'
        rating:
          $ref: '#/components/schemas/SteakRating'
        restaurantName:
          $ref: '#/components/schemas/RestaurantName'
        restaurantLocation:
          $ref: '#/components/schemas/RestaurantLocation'
        images:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ImageUpload'
          description: One or more steak photos. At least one required; each ≤ 3 MB.
        tagIds:
          $ref: '#/components/schemas/TagIdList'
        visibility:
          $ref: '#/components/schemas/PostVisibility'

    UpdatePostForm:
      type: object
      required: [title, rating]
      properties:
        title:
          $ref: '#/components/schemas/PostTitle'
        comment:
          $ref: '#/components/schemas/PostComment'
        rating:
          $ref: '#/components/schemas/SteakRating'
        restaurantName:
          $ref: '#/components/schemas/RestaurantName'
        restaurantLocation:
          $ref: '#/components/schemas/RestaurantLocation'
        keepImageUrls:
          type: array
          items:
            type: string
            maxLength: 512
          description: Existing image URLs to retain, in display order.
          example: [/uploads/abc123.jpg]
        images:
          type: array
          items:
            $ref: '#/components/schemas/ImageUpload'
          description: New photos to append. Each ≤ 3 MB. Combined with kept URLs, at least one image must remain.
        tagIds:
          $ref: '#/components/schemas/TagIdList'
        visibility:
          $ref: '#/components/schemas/PostVisibility'

    UpdateProfileResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
          description: Refreshed JWT reflecting updated profile claims.
        user:
          $ref: '#/components/schemas/UserSummary'

    UserSummary:
      type: object
      required: [id, username, email, displayName]
      description: |
        Public account profile. Does **not** include role or scopes — read those from the JWT `roles` and `scopes` claims.
      properties:
        id:
          type: string
          format: uuid
          description: User UUID.
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        username:
          $ref: '#/components/schemas/Username'
        email:
          $ref: '#/components/schemas/Email'
        displayName:
          $ref: '#/components/schemas/DisplayName'
        avatarUrl:
          type: string
          nullable: true
          maxLength: 512
          description: Relative URL to profile photo, or null if unset.
          example: /uploads/avatar-abc.jpg

    AdminUserSummary:
      type: object
      required: [id, username, email, displayName, role, blocked]
      description: |
        Admin-only user record from `GET /users`. Includes assigned role for management UI.
        Public `/auth/me` still uses `UserSummary` without role.
      properties:
        id:
          type: string
          format: uuid
        username:
          $ref: '#/components/schemas/Username'
        email:
          $ref: '#/components/schemas/Email'
        displayName:
          $ref: '#/components/schemas/DisplayName'
        avatarUrl:
          type: string
          nullable: true
          maxLength: 512
        role:
          type: string
          enum: [USER, MODERATOR, ADMIN]
          example: USER
        blocked:
          type: boolean
          description: When true, the user cannot sign in.

    AdminUserPage:
      type: object
      required: [content, page, size, totalElements, totalPages]
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/AdminUserSummary'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer

    PostPage:
      type: object
      required: [content, page, size, totalElements, totalPages]
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/PostResponse'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer

    CommentPage:
      type: object
      required: [content, page, size, totalElements, totalPages]
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/CommentResponse'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer

    UpdateUserBlockedRequest:
      type: object
      required: [blocked]
      properties:
        blocked:
          type: boolean
          description: Set true to block sign-in, false to restore access.

    UpdateUserRoleRequest:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [USER, MODERATOR]
          description: USER removes moderator access; MODERATOR grants moderation tools.
          example: MODERATOR

    UserPublicProfile:
      type: object
      required: [id, username, displayName, postCount, subscribed]
      properties:
        id:
          type: string
          format: uuid
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        username:
          $ref: '#/components/schemas/Username'
        displayName:
          $ref: '#/components/schemas/DisplayName'
        avatarUrl:
          type: string
          nullable: true
          maxLength: 512
          example: /uploads/avatar-abc.jpg
        postCount:
          type: integer
          format: int64
          minimum: 0
          description: Count of public, non-hidden posts.
          example: 12
        subscribed:
          type: boolean
          description: Whether the authenticated viewer follows this user.
        blocked:
          type: boolean
          nullable: true
          description: Present when the viewer has `users:block`; otherwise omitted.
        role:
          type: string
          nullable: true
          enum: [USER, MODERATOR, ADMIN]
          description: Present when the viewer has `users:block`; otherwise omitted.
          example: true

    SubscriptionSummary:
      type: object
      required: [user, subscribedAt]
      properties:
        user:
          $ref: '#/components/schemas/UserPublicProfile'
        subscribedAt:
          type: string
          format: date-time
          description: When the subscription was created (ISO-8601 UTC).
          example: '2026-05-30T18:30:00Z'

    AuthorSummary:
      type: object
      required: [id, displayName]
      properties:
        id:
          type: string
          format: uuid
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        displayName:
          $ref: '#/components/schemas/DisplayName'

    PostResponse:
      type: object
      required: [id, title, rating, imageUrls, createdAt, hidden, visibility, author, tags]
      properties:
        id:
          type: string
          format: uuid
          example: b2c3d4e5-f6a7-8901-bcde-f12345678901
        title:
          $ref: '#/components/schemas/PostTitle'
        comment:
          allOf:
            - $ref: '#/components/schemas/PostComment'
          nullable: true
        rating:
          $ref: '#/components/schemas/SteakRating'
        imageUrls:
          type: array
          minItems: 1
          items:
            type: string
            maxLength: 512
          description: Ordered photo URLs for the post.
          example: [/uploads/abc123.jpg, /uploads/def456.jpg]
        restaurantName:
          allOf:
            - $ref: '#/components/schemas/RestaurantName'
          nullable: true
        restaurantLocation:
          allOf:
            - $ref: '#/components/schemas/RestaurantLocation'
          nullable: true
        createdAt:
          type: string
          format: date-time
          description: When the post was published (ISO-8601 UTC).
          example: '2026-05-30T18:30:00Z'
        hidden:
          type: boolean
          description: True if moderators hid the post from public feeds.
          example: false
        moderationReason:
          type: string
          nullable: true
          maxLength: 500
          description: Optional explanation shown to the author when the post is hidden.
        moderationRestoredAt:
          type: string
          format: date-time
          nullable: true
          description: Set when a moderator restores the post; visible to the author only.
        visibility:
          $ref: '#/components/schemas/PostVisibility'
        author:
          $ref: '#/components/schemas/AuthorSummary'
        tags:
          type: array
          items:
            $ref: '#/components/schemas/ReviewTagSummary'

    ReviewTagSummary:
      type: object
      required: [id, label, sentiment]
      properties:
        id:
          type: string
          format: uuid
          example: c3d4e5f6-a7b8-9012-cdef-123456789012
        label:
          type: string
          maxLength: 80
          description: Human-readable tag label.
          example: Juicy
        sentiment:
          type: string
          enum: [POSITIVE, NEGATIVE]
          example: POSITIVE

    ReviewTagCatalog:
      type: object
      required: [positive, negative]
      properties:
        positive:
          type: array
          items:
            $ref: '#/components/schemas/ReviewTagSummary'
        negative:
          type: array
          items:
            $ref: '#/components/schemas/ReviewTagSummary'

    CommentResponse:
      type: object
      required: [id, body, createdAt, author]
      properties:
        id:
          type: string
          format: uuid
          example: d4e5f6a7-b8c9-0123-def0-234567890123
        body:
          type: string
          maxLength: 2000
          description: Comment text (`post_comments.body`, TEXT capped at 2000 in API).
          example: That crust looks incredible!
        createdAt:
          type: string
          format: date-time
          example: '2026-05-30T19:00:00Z'
        author:
          $ref: '#/components/schemas/AuthorSummary'

    HidePostRequest:
      type: object
      properties:
        reason:
          type: string
          nullable: true
          maxLength: 500
          description: Optional message for the post author explaining why it was removed from feeds.

    CreateCommentRequest:
      type: object
      required: [body]
      properties:
        body:
          type: string
          minLength: 1
          maxLength: 2000
          description: Comment text (1–2000 characters).
          example: What temperature did you pull it at?

    ApiError:
      type: object
      required: [timestamp, status, error, message]
      properties:
        timestamp:
          type: string
          format: date-time
          example: '2026-05-30T19:00:00Z'
        status:
          type: integer
          example: 400
        error:
          type: string
          example: Bad Request
        message:
          type: string
          example: Title must be at most 120 characters
        fieldErrors:
          type: object
          additionalProperties:
            type: string
          nullable: true
          example:
            title: must not be blank

  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
