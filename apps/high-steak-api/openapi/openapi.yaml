          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT from `POST /auth/login` or `POST /auth/register`.

        Decode the payload to read authorization data (never returned in JSON bodies):
        - `roles` — array with one role name (e.g. `USER`, `MODERATOR`, `ADMIN`)
        - `scopes` — permission strings checked by the API (see `x-required-scopes` on each operation)

        Known scopes:
        - `posts:read`, `posts:read:own`, `posts:write`, `posts:delete:own`, `posts:delete:any`, `posts:moderate`
        - `comments:write`
        - `users:discover`, `users:read`, `users:manage`
        - `subscriptions:read`, `subscriptions:write`
        - `bookmarks:read`, `bookmarks:write`

  x-scope-definitions:
    "posts:read": View non-hidden posts and comments
    "posts:read:own": View own posts including via /posts/mine
    "posts:write": Create and edit own posts
    "posts:delete:own": Delete own posts
    "posts:delete:any": Delete any post
    "posts:moderate": Hide posts from public feeds
    "comments:write": Add comments to posts
    "users:discover": Search users to follow
    "users:read": List all users (admin and moderator)
    "users:manage": Change user roles (admin)
    "subscriptions:read": View following feed and subscription list
    "subscriptions:write": Follow and unfollow users
    "bookmarks:read": View bookmarked posts
    "bookmarks:write": Bookmark and unbookmark posts

  parameters:
    PostId:
      name: id
      in: path
      required: true
      description: Steak post UUID.
      schema:
        type: string
        format: uuid
      example: b2c3d4e5-f6a7-8901-bcde-f12345678901

    CommentId:
      name: commentId
      in: path
      required: true
      description: Post comment UUID.
      schema:
        type: string
        format: uuid
      example: d4e5f6a7-b8c9-0123-def0-234567890123

    PageNumber:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0

    PageSize:
      name: size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 50
        default: 20

  schemas:
    AppConfig:
      type: object
      required: [maxImageSizeMb, maxImagesPerPost, maxImageBytes]
      properties:
        maxImageSizeMb:
          type: integer
          minimum: 1
          maximum: 50
          example: 5
        maxImagesPerPost:
          type: integer
          minimum: 1
          maximum: 20
          example: 10
        maxImageBytes:
          type: integer
          format: int64
          example: 5242880

    Username:
      type: string
      minLength: 3
      maxLength: 50
      pattern: '^[a-zA-Z][a-zA-Z0-9_-]*$'
      description: |
        Unique login handle (`users.username`). Letters, digits, underscores, and hyphens only;
        must start with a letter (not a number).
      example: steak_lover

    AvailabilityResponse:
      type: object
      required: [available, message]
      properties:
        available:
          type: boolean
          description: True when the value is valid and not already taken.
        message:
          type: string
          description: Human-readable validation or availability message.
          example: Username is available

    Email:
      type: string
      format: email
      maxLength: 255
      description: Account email stored in `users.email` (VARCHAR 255).
      example: chef@example.com

    Password:
      type: string
      format: password
      minLength: 8
      maxLength: 100
      description: Plain-text password for login/register (stored hashed server-side).
      example: s3cur3Pass!

    DisplayName:
      type: string
      minLength: 2
      maxLength: 100
      description: Public name shown on posts and profiles (`users.display_name`).
      example: Hossam Kandel

    PostTitle:
      type: string
      minLength: 1
      maxLength: 120
      description: Short headline for the steak post (`steak_posts.title`).
      example: Perfect medium-rare ribeye

    PostComment:
      type: string
      maxLength: 65535
      description: Optional long-form caption (`steak_posts.comment`, TEXT).
      example: 28-day dry-aged ribeye, reverse seared, finished with rosemary butter.

    RestaurantName:
      type: string
      maxLength: 120
      description: Optional venue name (`steak_posts.restaurant_name`).
      example: The Prime Cut

    RestaurantLocation:
      type: string
      maxLength: 255
      description: Optional city or address hint (`steak_posts.restaurant_location`).
      example: Austin, TX

    SteakRating:
      type: integer
      format: int32
      minimum: 1
      maximum: 5
      description: Overall score from 1 (poor) to 5 (exceptional).
      example: 5

    PostVisibility:
      type: string
      enum: [PUBLIC, FOLLOWERS_ONLY]
      default: PUBLIC
      description: |
        Who can see the post. `PUBLIC` appears in the everyone feed for other users
        (not the author). `FOLLOWERS_ONLY` is visible to the author, their followers,
        and moderators only.
      example: PUBLIC

    ImageUpload:
      type: string
      format: binary
      description: Image file (JPEG, PNG, WebP, etc.). Each file must be ≤ 5 MB (configurable via `APP_MAX_IMAGE_SIZE_MB`).

    TagIdList:
      type: array
      maxItems: 12
      items:
        type: string
        format: uuid
      description: Quick-review tag IDs from `GET /posts/review-tags` (max 12).

    RegisterRequest:
      type: object
      required: [username, email, password, displayName]
      properties:
        username:
          $ref: '#/components/schemas/Username'
        email:
          $ref: '#/components/schemas/Email'
        password:
          $ref: '#/components/schemas/Password'
        displayName:
          $ref: '#/components/schemas/DisplayName'

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          maxLength: 50
          description: Registered username.
          example: steaklover42
        password:
          $ref: '#/components/schemas/Password'

    AuthResponse:
      type: object
      required: [token, refreshToken]
      properties:
        token:
          type: string
          description: "JWT access token used as `Authorization: Bearer <token>`."
          example: eyJhbGciOiJIUzI1NiJ9...
        refreshToken:
          type: string
          description: Opaque refresh token for `POST /auth/refresh` and `POST /auth/logout`.

    RegisterResponse:
      type: object
      required: [verificationRequired, message, email]
      properties:
        verificationRequired:
          type: boolean
          description: When true, check email and call POST /auth/verify-email before login.
        message:
          type: string
        email:
          $ref: '#/components/schemas/Email'
        token:
          type: string
          nullable: true
        refreshToken:
          type: string
          nullable: true

    VerifyEmailRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
          description: Token from the verification email link.

    ConfirmAccountDeletionRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
          description: Token from the account deletion confirmation email link.

    RequestPasswordResetRequest:
      type: object
      required: [username, email]
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 50
          description: Account username as entered at login (no format validation on this endpoint).
        email:
          $ref: '#/components/schemas/Email'

    ResetPasswordRequest:
      type: object
      required: [token, password, passwordConfirm]
      properties:
        token:
          type: string
          description: Token from the password reset email link.
        password:
          $ref: '#/components/schemas/Password'
        passwordConfirm:
          $ref: '#/components/schemas/Password'

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    ResendVerificationRequest:
      type: object
      required: [email]
      properties:
        email:
          $ref: '#/components/schemas/Email'

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    LogoutRequest:
      type: object
      properties:
        refreshToken:
          type: string
          description: Refresh token to revoke. Optional when using an HttpOnly cookie (future).

    UpdateProfileRequest:
      type: object
      description: Display name and/or avatar. Email cannot be changed after registration.
      properties:
        displayName:
          $ref: '#/components/schemas/DisplayName'

    UpdateProfileMultipartForm:
      type: object
      description: Multipart alternative to JSON profile update. Email cannot be changed.
      properties:
        displayName:
          $ref: '#/components/schemas/DisplayName'
        avatar:
          $ref: '#/components/schemas/ImageUpload'

    CreatePostForm:
      type: object
      required: [title, rating, images]
      properties:
        title:
          $ref: '#/components/schemas/PostTitle'
        comment:
          $ref: '#/components/schemas/PostComment'
        rating:
          $ref: '#/components/schemas/SteakRating'
        restaurantName:
          $ref: '#/components/schemas/RestaurantName'
        restaurantLocation:
          $ref: '#/components/schemas/RestaurantLocation'
        placeId:
          type: string
          format: uuid
          description: Resolved place to tag on the post (snapshots restaurant fields).
        images:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ImageUpload'
          description: One or more steak photos. At least one required; each ≤ 5 MB.
        tagIds:
          $ref: '#/components/schemas/TagIdList'
        visibility:
          $ref: '#/components/schemas/PostVisibility'

    UpdatePostForm:
      type: object
      required: [title, rating]
      properties:
        title:
          $ref: '#/components/schemas/PostTitle'
        comment:
          $ref: '#/components/schemas/PostComment'
        rating:
          $ref: '#/components/schemas/SteakRating'
        restaurantName:
          $ref: '#/components/schemas/RestaurantName'
        restaurantLocation:
          $ref: '#/components/schemas/RestaurantLocation'
        keepImageUrls:
          type: array
          items:
            type: string
            maxLength: 512
          description: Existing image URLs to retain, in display order. Ignored when `imageOrder` is sent.
          example: [/uploads/abc123.jpg]
        imageOrder:
          type: array
          items:
            type: string
            maxLength: 512
          description: |
            Full desired image sequence for the post. Each entry is either an existing image URL
            or a new-upload slot `__new__:0`, `__new__:1`, … matching the multipart `images` array.
            When provided, this takes precedence over `keepImageUrls` and allows new uploads
            to appear before saved photos (cover photo).
        images:
          type: array
          items:
            $ref: '#/components/schemas/ImageUpload'
          description: New photos referenced by `__new__:N` slots in `imageOrder`, or appended after `keepImageUrls` when `imageOrder` is omitted. Each ≤ 5 MB. Combined with kept URLs, at least one image must remain.
        tagIds:
          $ref: '#/components/schemas/TagIdList'
        visibility:
          $ref: '#/components/schemas/PostVisibility'

    UpdateProfileResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
          description: Refreshed JWT reflecting updated profile claims.
        user:
          $ref: '#/components/schemas/UserSummary'

    UserSummary:
      type: object
      required: [id, username, email, displayName]
      description: |
        Public account profile. Does **not** include role or scopes — read those from the JWT `roles` and `scopes` claims.
      properties:
        id:
          type: string
          format: uuid
          description: User UUID.
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        username:
          $ref: '#/components/schemas/Username'
        email:
          $ref: '#/components/schemas/Email'
        displayName:
          $ref: '#/components/schemas/DisplayName'
        avatarUrl:
          type: string
          nullable: true
          maxLength: 512
          description: Relative URL to profile photo, or null if unset.
          example: /uploads/avatar-abc.jpg

    AdminUserSummary:
      type: object
      required: [id, username, email, displayName, role, blocked]
      description: |
        Admin-only user record from `GET /users`. Includes assigned role for management UI.
        Public `/auth/me` still uses `UserSummary` without role.
      properties:
        id:
          type: string
          format: uuid
        username:
          $ref: '#/components/schemas/Username'
        email:
          $ref: '#/components/schemas/Email'
        displayName:
          $ref: '#/components/schemas/DisplayName'
        avatarUrl:
          type: string
          nullable: true
          maxLength: 512
        role:
          type: string
          enum: [USER, MODERATOR, ADMIN]
          example: USER
        blocked:
          type: boolean
          description: When true, the user cannot sign in.

    AdminUserPage:
      type: object
      required: [content, page, size, totalElements, totalPages]
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/AdminUserSummary'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer

    PostPage:
      type: object
      required: [content, page, size, totalElements, totalPages]
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/PostResponse'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer

    NotificationPreferencesResponse:
      type: object
      required:
        - emailEnabled
        - welcomeEmail
        - commentEmail
        - followerEmail
        - moderationEmail
      properties:
        emailEnabled:
          type: boolean
          description: Master switch for all email notifications.
        welcomeEmail:
          type: boolean
        commentEmail:
          type: boolean
        followerEmail:
          type: boolean
        moderationEmail:
          type: boolean

    UpdateNotificationPreferencesRequest:
      type: object
      properties:
        emailEnabled:
          type: boolean
        welcomeEmail:
          type: boolean
        commentEmail:
          type: boolean
        followerEmail:
          type: boolean
        moderationEmail:
          type: boolean

    CommentPage:
      type: object
      required: [content, page, size, totalElements, totalPages]
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/CommentResponse'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer

    UpdateUserBlockedRequest:
      type: object
      required: [blocked]
      properties:
        blocked:
          type: boolean
          description: Set true to block sign-in, false to restore access.

    UpdateUserRoleRequest:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [USER, MODERATOR]
          description: USER removes moderator access; MODERATOR grants moderation tools.
          example: MODERATOR

    UserPublicProfile:
      type: object
      required: [id, username, displayName, postCount, subscribed]
      properties:
        id:
          type: string
          format: uuid
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        username:
          $ref: '#/components/schemas/Username'
        displayName:
          $ref: '#/components/schemas/DisplayName'
        avatarUrl:
          type: string
          nullable: true
          maxLength: 512
          example: /uploads/avatar-abc.jpg
        postCount:
          type: integer
          format: int64
          minimum: 0
          description: Count of public, non-hidden posts.
          example: 12
        subscribed:
          type: boolean
          description: Whether the authenticated viewer follows this user.
        blocked:
          type: boolean
          nullable: true
          description: Present when the viewer has `users:block`; otherwise omitted.
        role:
          type: string
          nullable: true
          enum: [USER, MODERATOR, ADMIN]
          description: Present when the viewer has `users:block`; otherwise omitted.
          example: true

    SubscriptionSummary:
      type: object
      required: [user, subscribedAt]
      properties:
        user:
          $ref: '#/components/schemas/UserPublicProfile'
        subscribedAt:
          type: string
          format: date-time
          description: When the subscription was created (ISO-8601 UTC).
          example: '2026-05-30T18:30:00Z'

    AuthorSummary:
      type: object
      required: [id, displayName]
      properties:
        id:
          type: string
          format: uuid
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        displayName:
          $ref: '#/components/schemas/DisplayName'
        avatarUrl:
          type: string
          nullable: true
          description: Full-size profile photo path. Omitted in feed, bookmark, and comment list responses.
          example: /uploads/avatar-abc.jpg
        avatarThumbnailUrl:
          type: string
          nullable: true
          description: |
            Small cached JPEG (64×64) for list UIs. Present on feed, bookmarks, and comment author fields
            instead of `avatarUrl`.
          example: /uploads/avatars/thumbs/avatar-abc-feed.jpg
        subscribed:
          type: boolean
          nullable: true
          description: |
            Whether the authenticated viewer follows this author. Set on `GET /posts` (Everyone feed) only.
          example: false

    PostResponse:
      type: object
      required: [id, title, rating, imageUrls, createdAt, hidden, visibility, author, tags]
      properties:
        id:
          type: string
          format: uuid
          example: b2c3d4e5-f6a7-8901-bcde-f12345678901
        title:
          $ref: '#/components/schemas/PostTitle'
        comment:
          allOf:
            - $ref: '#/components/schemas/PostComment'
          nullable: true
        rating:
          $ref: '#/components/schemas/SteakRating'
        imageUrls:
          type: array
          minItems: 1
          items:
            type: string
            maxLength: 512
          description: Ordered photo URLs for the post.
          example: [/uploads/abc123.jpg, /uploads/def456.jpg]
        restaurantName:
          allOf:
            - $ref: '#/components/schemas/RestaurantName'
          nullable: true
        restaurantLocation:
          allOf:
            - $ref: '#/components/schemas/RestaurantLocation'
          nullable: true
        place:
          allOf:
            - $ref: '#/components/schemas/PlaceSummary'
          nullable: true
        createdAt:
          type: string
          format: date-time
          description: When the post was published (ISO-8601 UTC).
          example: '2026-05-30T18:30:00Z'
        hidden:
          type: boolean
          description: True if moderators hid the post from public feeds.
          example: false
        moderationReason:
          type: string
          nullable: true
          maxLength: 500
          description: Optional explanation shown to the author when the post is hidden.
        moderationRestoredAt:
          type: string
          format: date-time
          nullable: true
          description: Set when a moderator restores the post; visible to the author only.
        visibility:
          $ref: '#/components/schemas/PostVisibility'
        author:
          $ref: '#/components/schemas/AuthorSummary'
        tags:
          type: array
          items:
            $ref: '#/components/schemas/ReviewTagSummary'
        bookmarked:
          type: boolean
          description: True if the authenticated user bookmarked this post.
          example: false

    ReviewTagSummary:
      type: object
      required: [id, label, sentiment]
      properties:
        id:
          type: string
          format: uuid
          example: c3d4e5f6-a7b8-9012-cdef-123456789012
        label:
          type: string
          maxLength: 80
          description: Human-readable tag label.
          example: Juicy
        sentiment:
          type: string
          enum: [POSITIVE, NEGATIVE]
          example: POSITIVE

    ReviewTagCatalog:
      type: object
      required: [positive, negative]
      properties:
        positive:
          type: array
          items:
            $ref: '#/components/schemas/ReviewTagSummary'
        negative:
          type: array
          items:
            $ref: '#/components/schemas/ReviewTagSummary'

    CommentResponse:
      type: object
      required: [id, body, createdAt, author]
      properties:
        id:
          type: string
          format: uuid
          example: d4e5f6a7-b8c9-0123-def0-234567890123
        body:
          type: string
          maxLength: 2000
          description: Comment text (`post_comments.body`, TEXT capped at 2000 in API).
          example: That crust looks incredible!
        createdAt:
          type: string
          format: date-time
          example: '2026-05-30T19:00:00Z'
        author:
          $ref: '#/components/schemas/AuthorSummary'

    HidePostRequest:
      type: object
      properties:
        reason:
          type: string
          nullable: true
          maxLength: 500
          description: Optional message for the post author explaining why it was removed from feeds.

    CreateCommentRequest:
      type: object
      required: [body]
      properties:
        body:
          type: string
          minLength: 1
          maxLength: 2000
          description: |
            Plain-text comment (1–2000 characters). Emoji and line breaks are allowed.
            HTML and other markup are rejected. Post captions and other fields remain plain text only.
          example: What temperature did you pull it at? 🔥

    UpdateCommentRequest:
      type: object
      required: [body]
      properties:
        body:
          type: string
          minLength: 1
          maxLength: 2000
          description: Updated plain-text comment body (same rules as create).
          example: Pulled at 125°F — rested 10 minutes.

    PlaceSummary:
      type: object
      required: [id, provider, name, latitude, longitude, locationPrecision]
      properties:
        id:
          type: string
          format: uuid
        provider:
          type: string
          enum: [google, mapbox, osm, manual]
        name:
          type: string
        formattedAddress:
          type: string
          nullable: true
        latitude:
          type: string
        longitude:
          type: string
        locationPrecision:
          type: string
          enum: [EXACT, APPROXIMATE]
        previewPhotoUrl:
          type: string
          nullable: true
        previewPhotoSource:
          type: string
          nullable: true
          enum: [COMMUNITY, GOOGLE]

    PlaceSuggestion:
      type: object
      required: [provider, providerPlaceId, name]
      properties:
        provider:
          type: string
          enum: [google, mapbox, osm, manual]
        providerPlaceId:
          type: string
        name:
          type: string
        formattedAddress:
          type: string
          nullable: true
        latitude:
          type: string
          nullable: true
        longitude:
          type: string
          nullable: true
        previewPhotoUrl:
          type: string
          nullable: true

    AutocompleteResponse:
      type: object
      required: [suggestions]
      properties:
        suggestions:
          type: array
          items:
            $ref: '#/components/schemas/PlaceSuggestion'

    ResolvePlaceRequest:
      type: object
      required: [provider, providerPlaceId]
      properties:
        provider:
          type: string
          enum: [google, mapbox, osm, manual]
        providerPlaceId:
          type: string
        name:
          type: string
        formattedAddress:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        locality:
          type: string
        adminArea:
          type: string
        countryCode:
          type: string
          minLength: 2
          maxLength: 2

    PlaceNearbySummary:
      type: object
      required: [id, name, latitude, longitude, distanceM, postCount]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        formattedAddress:
          type: string
          nullable: true
        latitude:
          type: string
        longitude:
          type: string
        distanceM:
          type: integer
        postCount:
          type: integer
        avgRating:
          type: number
          nullable: true
        coverImageUrl:
          type: string
          nullable: true
        coverImageSource:
          type: string
          nullable: true
          enum: [COMMUNITY, GOOGLE]

    PlaceNearbyPage:
      type: object
      required: [content, page, size, totalElements, totalPages]
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/PlaceNearbySummary'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
        totalPages:
          type: integer

    ApiError:
      type: object
      required: [timestamp, status, error, message]
      properties:
        timestamp:
          type: string
          format: date-time
          example: '2026-05-30T19:00:00Z'
        status:
          type: integer
          example: 400
        error:
          type: string
          example: Bad Request
        message:
          type: string
          example: Title must be at most 120 characters
        fieldErrors:
          type: object
          additionalProperties:
            type: string
          nullable: true
          example:
            title: must not be blank

  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
