spring:
  application:
    name: high-steak-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/high_steak?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci}
    username: ${SPRING_DATASOURCE_USERNAME:high_steak}
    password: ${SPRING_DATASOURCE_PASSWORD:high_steak}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS:false}
  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:5MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:53MB}

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: ${SERVER_SERVLET_CONTEXT_PATH:/api}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    url: /openapi.yaml
    operations-sorter: method
    tags-sorter: alpha

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-use-at-least-32-characters!!}
    access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:${JWT_EXPIRATION_MS:3600000}}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:1209600000}
  uploads:
    dir: ${UPLOADS_DIR:uploads}
    max-image-size-mb: ${APP_MAX_IMAGE_SIZE_MB:5}
    max-images-per-post: ${APP_MAX_IMAGES_PER_POST:10}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  logging:
    http-access-enabled: ${HTTP_ACCESS_LOG_ENABLED:true}
    skip-paths: /health,/config,/swagger-ui,/v3/api-docs,/openapi.yaml,/uploads
  bootstrap:
    admin:
      enabled: ${BOOTSTRAP_ADMIN_ENABLED:true}
      username: ${BOOTSTRAP_ADMIN_USERNAME:admin}
      password: ${BOOTSTRAP_ADMIN_PASSWORD:AdminPass123!}
      email: ${BOOTSTRAP_ADMIN_EMAIL:admin@high-steak.local}
      display-name: ${BOOTSTRAP_ADMIN_DISPLAY_NAME:System Admin}
  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:High Steaks <noreply@notify.hossam.io>}
    base-url: ${APP_BASE_URL:https://steaks.apps.hossam.io}
  auth:
    auto-verify-on-register: ${AUTH_AUTO_VERIFY_ON_REGISTER:false}
    verification-expiration-hours: ${AUTH_VERIFICATION_EXPIRATION_HOURS:24}
    password-reset-expiration-hours: ${AUTH_PASSWORD_RESET_EXPIRATION_HOURS:24}

logging:
  level:
    root: INFO
    com.highsteak.api: ${APP_LOG_LEVEL:INFO}
    com.highsteak.api.config.ApiRequestLoggingFilter: ${APP_HTTP_LOG_LEVEL:INFO}
    org.springframework.security: INFO
