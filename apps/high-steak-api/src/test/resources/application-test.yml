spring:
  datasource:
    url: jdbc:h2:mem:highsteak;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

server:
  servlet:
    context-path: /api

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

app:
  jwt:
    secret: test-secret-with-at-least-32-characters!!
    access-expiration-ms: 3600000
    refresh-expiration-ms: 1209600000
  uploads:
    dir: ${java.io.tmpdir}/high-steak-uploads
  cors:
    allowed-origins: http://localhost:5173
  logging:
    http-access-enabled: false
  bootstrap:
    admin:
      enabled: false

logging:
  level:
    com.highsteak.api: WARN
