<!doctype html>
<html lang="en" data-theme="ember">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>High Steak</title>
    <script>
      try {
        var t = localStorage.getItem('hs-theme');
        if (t === 'steam') document.documentElement.dataset.theme = 'steam';
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
