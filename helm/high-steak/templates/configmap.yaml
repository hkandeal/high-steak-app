apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "high-steak.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "high-steak.labels" . | nindent 4 }}
data:
  SPRING_DATASOURCE_URL: {{ .Values.configMap.SPRING_DATASOURCE_URL | quote }}
  SPRING_DATASOURCE_USERNAME: {{ .Values.configMap.SPRING_DATASOURCE_USERNAME | quote }}
  SERVER_SERVLET_CONTEXT_PATH: {{ .Values.configMap.SERVER_SERVLET_CONTEXT_PATH | quote }}
  CORS_ALLOWED_ORIGINS: {{ .Values.configMap.CORS_ALLOWED_ORIGINS | quote }}
  UPLOADS_DIR: {{ .Values.configMap.UPLOADS_DIR | quote }}
  BOOTSTRAP_ADMIN_ENABLED: {{ .Values.configMap.BOOTSTRAP_ADMIN_ENABLED | quote }}
  HTTP_ACCESS_LOG_ENABLED: {{ .Values.configMap.HTTP_ACCESS_LOG_ENABLED | quote }}
  APP_MAX_IMAGE_SIZE_MB: {{ .Values.uploads.maxImageSizeMb | quote }}
  APP_MAX_IMAGES_PER_POST: {{ .Values.uploads.maxImagesPerPost | quote }}
  SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE: {{ printf "%dMB" (int .Values.uploads.maxImageSizeMb) | quote }}
  SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE: {{ printf "%dMB" (add (mul (int .Values.uploads.maxImageSizeMb) (int .Values.uploads.maxImagesPerPost)) 3) | quote }}
  MAIL_ENABLED: {{ .Values.mail.enabled | quote }}
  MAIL_FROM: {{ .Values.mail.from | quote }}
  APP_BASE_URL: {{ .Values.mail.baseUrl | quote }}
  {{- if .Values.mail.enabled }}
  SPRING_MAIL_HOST: {{ .Values.mail.smtp.host | quote }}
  SPRING_MAIL_PORT: {{ .Values.mail.smtp.port | quote }}
  SPRING_MAIL_SMTP_AUTH: {{ .Values.mail.smtp.auth | quote }}
  SPRING_MAIL_SMTP_STARTTLS: {{ .Values.mail.smtp.starttls | quote }}
  {{- if .Values.mail.smtp.username }}
  SPRING_MAIL_USERNAME: {{ .Values.mail.smtp.username | quote }}
  {{- end }}
  {{- end }}
