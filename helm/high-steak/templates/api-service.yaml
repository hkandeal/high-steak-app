apiVersion: v1
kind: Service
metadata:
  name: {{ include "high-steak.fullname" . }}-api-svc
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "high-steak.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.apiService.type }}
  selector:
    app.kubernetes.io/name: {{ include "high-steak.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: {{ .Values.apiService.port }}
      targetPort: {{ .Values.apiService.targetPort }}
