name: app infra update K8s manifest workflow

on:
  repository_dispatch:
    types: app-update-service-build-number

concurrency:
  group: helm-values-update-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  DevDeploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.API_TOKEN_GITHUB }}

      - name: Update Helm image tags via pull request
        env:
          WEB_TAG: ${{ github.event.client_payload.buildnumber }}
          API_TAG: ${{ github.event.client_payload.api_buildnumber }}
          GH_TOKEN: ${{ secrets.API_TOKEN_GITHUB }}
        run: |
          set -euo pipefail

          if [ -z "${WEB_TAG}" ] && [ -z "${API_TAG}" ]; then
            echo "No image tags in dispatch payload; nothing to update."
            exit 0
          fi

          VALUES_FILE=helm/high-steak/values.yaml
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.1/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

          git pull --rebase origin main

          MSG_PARTS=()
          if [ -n "${WEB_TAG}" ]; then
            yq -i '.image.tag = strenv(WEB_TAG)' "${VALUES_FILE}"
            MSG_PARTS+=("web:${WEB_TAG}")
          fi
          if [ -n "${API_TAG}" ]; then
            yq -i '.apiImage.tag = strenv(API_TAG)' "${VALUES_FILE}"
            MSG_PARTS+=("api:${API_TAG}")
          fi

          if git diff --quiet -- "${VALUES_FILE}"; then
            echo "Helm values already at requested tags; skipping commit."
            exit 0
          fi

          COMMIT_MSG="Update production images ($(IFS=,; echo "${MSG_PARTS[*]}"))"
          BRANCH="chore/prod-images-${GITHUB_RUN_ID}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add "${VALUES_FILE}"
          git commit -m "${COMMIT_MSG}"
          git push -u origin "${BRANCH}"

          PR_URL="$(gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "${COMMIT_MSG}" \
            --body "Automated Helm image tag bump after production deploy.")"

          echo "Created ${PR_URL}"

          # Merge through a PR so branch protection is satisfied. --admin uses the PAT
          # owner's privileges when repo rules require pull requests before merging.
          gh pr merge "${PR_URL}" --squash --admin --delete-branch
